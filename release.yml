name: Build and Release Windows Exe

on:
  push:
    tags:
      - 'v*'  # Запускается когда пушишь тег начинающийся с v
      - 'v.*'  # Добавим поддержку твоего формата v.1.0.2

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.x'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build Windows release
        run: flutter build windows --release
      
      - name: Create ZIP archive
        run: |
          cd build\windows\x64\runner\Release
          Compress-Archive -Path * -DestinationPath ..\..\..\..\..\app-windows.zip
          cd ..\..\..\..\..
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            Автоматическая сборка для Windows
            - Версия: ${{ github.ref }}
            - Дата сборки: ${{ github.event.repository.updated_at }}
          draft: false
          prerelease: false
      
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./app-windows.zip
          asset_name: teploservice_${{ github.ref_name }}_windows.zip
          asset_content_type: application/zip