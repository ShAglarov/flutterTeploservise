name: teploservice_flutter
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.1
  web_socket_channel: ^3.0.3
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  json_annotation: ^4.11.0
  flutter_secure_storage: ^10.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  uuid: ^4.5.1
  freezed_annotation: ^3.1.0
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1
  connectivity_plus: ^6.1.0
  intl: ^0.20.2
  flutter_slidable: ^4.0.3
  image_picker: ^1.1.2
  window_manager: ^0.5.1
  windows_notification: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.11.1
  riverpod_generator: ^4.0.3
  json_serializable: ^6.13.0
  riverpod_lint: ^3.1.3
  freezed: ^3.2.5
  drift_dev: ^2.31.0
  msix: ^3.16.1

flutter:
  uses-material-design: true

msix:
  display_name: "TeploserviceMap"
  publisher_display_name: "Teploservice"
  identity_name: "[PLACEHOLDER_IDENTITY]" # Leave as placeholder for now
  publisher: "[PLACEHOLDER_PUBLISHER]" # Leave as placeholder for now
  version: "1.0.0.0"
  capabilities: "internetClient, pushNotification" # pushNotification is critical
